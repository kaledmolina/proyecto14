services:
  db:
    image: mysql:8.0
    container_name: mysql-database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: news_portal
    # Los puertos 3306 se eliminaron por seguridad. 
    # La web igual puede conectarse internamente.
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-web-app
    ports:
      - "127.0.0.1:3000:3000" # Modificado para obligar a pasar por CloudPanel
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db:3306/news_portal
      - NEXTAUTH_URL=https://pulso24.tech # CRÍTICO para que el login funcione
      - NEXTAUTH_SECRET=news-portal-secret-key-change-in-production
      - HOSTNAME=0.0.0.0 # <-- LA SOLUCIÓN AL ERROR 502
    volumes:
      - /home/pulso24/htdocs/pulso24.tech/public/uploads:/app/public/uploads
    restart: always

volumes:
  mysql_data: