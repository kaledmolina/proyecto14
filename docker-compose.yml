services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-web-app
    ports:
      - "3000:3000"
    volumes:
      - ./db:/app/db
    environment:
      - DATABASE_URL=file:../db/custom.db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=news-portal-secret-key-change-in-production
    restart: always


